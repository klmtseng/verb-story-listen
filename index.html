<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4f8cff">
<title>動詞故事聽讀</title>
<style>
  :root{
    --bg:#f6f8fc; --card:#fff; --ink:#1f2733; --sub:#6b7686;
    --accent:#4f8cff; --verb:#e0533d; --verbbg:#fff0ed; --ok:#28c76f;
    --line:#e7ecf3; --shadow:0 2px 12px rgba(20,40,80,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Segoe UI",system-ui,sans-serif;
    line-height:1.7;padding:0 0 60px}
  header{background:linear-gradient(135deg,#4f8cff,#6ac1ff);color:#fff;
    padding:26px 20px 22px;border-radius:0 0 22px 22px;box-shadow:var(--shadow)}
  header h1{margin:0;font-size:22px;font-weight:800;letter-spacing:.5px}
  header p{margin:6px 0 0;opacity:.92;font-size:14px}
  .wrap{max-width:640px;margin:0 auto;padding:0 16px}
  .card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);
    padding:18px;margin-top:16px}
  .story-title{font-size:20px;font-weight:800;margin:0 0 2px}
  .story-zh{color:var(--sub);font-size:14px;margin:0 0 14px}

  /* audio */
  .audio-row{display:flex;gap:10px;margin:4px 0 6px}
  .abtn{flex:1;border:none;border-radius:12px;padding:13px 8px;font-size:15px;
    font-weight:700;color:#fff;background:var(--accent);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:7px}
  .abtn.slow{background:#7367f0}
  .abtn.playing{background:var(--ok)}
  .abtn small{font-weight:600;opacity:.85;font-size:12px}
  .hint-audio{font-size:12.5px;color:var(--sub);margin:2px 2px 0}

  /* sentences */
  .s{padding:11px 12px;border-radius:12px;margin:8px 0;background:#fafcff;
    border:1px solid var(--line);cursor:pointer;transition:background .15s}
  .s:active{background:#eef4ff}
  .s .en{font-size:17px}
  .s .zh{color:var(--sub);font-size:15px;margin-top:7px;padding-top:7px;
    border-top:1px dashed var(--line);display:none}
  .s.open .zh{display:block}
  .v{color:var(--verb);font-weight:800;background:var(--verbbg);
    border-radius:5px;padding:0 3px}

  .toolbar{display:flex;gap:10px;margin:6px 0 2px;flex-wrap:wrap}
  .tbtn{border:1px solid var(--line);background:#fff;border-radius:20px;
    padding:8px 15px;font-size:13.5px;color:var(--ink);cursor:pointer;font-weight:600}
  .tbtn:active{background:#eef4ff}
  .tbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* full-text reading mode */
  .fulltext{font-size:17.5px;line-height:2;padding:6px 2px}
  .fulltext .zhblock{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);
    color:var(--sub);font-size:15.5px;line-height:1.95;display:none}
  .fulltext.showzh .zhblock{display:block}

  /* collapsible section */
  .sec-h{display:flex;align-items:center;justify-content:space-between;
    cursor:pointer;font-weight:800;font-size:17px}
  .sec-h .chev{transition:transform .2s;color:var(--sub)}
  .sec.closed .chev{transform:rotate(-90deg)}
  .sec.closed .sec-body{display:none}
  .sec-body{margin-top:12px}

  /* verb table */
  table{width:100%;border-collapse:collapse;font-size:14.5px}
  th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--sub);font-size:12.5px;font-weight:700}
  td.base{font-weight:800;color:var(--accent)}
  td .zh{color:var(--sub);font-size:12px;display:block}

  /* quiz */
  .q{margin:12px 0;padding:13px;border-radius:12px;background:#fafcff;border:1px solid var(--line)}
  .q .qt{font-weight:700;font-size:15.5px}
  .q .qh{color:var(--accent);font-size:12.5px;margin-top:4px}
  .q .qa{margin-top:10px;padding:10px;border-radius:9px;background:#eafaf0;
    color:#166a3e;font-size:14.5px;display:none}
  .q.open .qa{display:block}
  .q .reveal{margin-top:9px;font-size:13px;color:var(--accent);font-weight:700;cursor:pointer}

  footer{text-align:center;color:var(--sub);font-size:12px;margin-top:22px;padding:0 20px;line-height:1.6}

  /* menu */
  .menu-item{display:flex;align-items:center;gap:12px;padding:14px 15px;border-radius:14px;
    background:var(--card);box-shadow:var(--shadow);margin-top:12px;cursor:pointer;transition:transform .1s}
  .menu-item:active{transform:scale(.99);background:#f2f7ff}
  .menu-item .num{flex:0 0 34px;height:34px;border-radius:50%;background:#eef4ff;color:var(--accent);
    font-weight:800;display:flex;align-items:center;justify-content:center;font-size:15px}
  .menu-item .mtxt{flex:1;min-width:0}
  .menu-item .mt{font-weight:800;font-size:16px}
  .menu-item .mz{color:var(--sub);font-size:13px;margin-top:1px}
  .menu-item .arrow{color:var(--sub);font-size:20px}
  .badges{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap}
  .badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
  .b-narrative{background:#eafaf0;color:#1b7a45}
  .b-dialogue{background:#eef0ff;color:#5145d6}
  .b-joke{background:#fff2e6;color:#c8641a}
  .b-grp{background:#f0f2f5;color:#6b7686}
  .backbtn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;
    color:var(--accent);font-size:15px;font-weight:700;padding:8px 0;cursor:pointer;margin-top:12px}
  .menu-intro{color:var(--sub);font-size:13.5px;margin:14px 2px 2px;line-height:1.7}

  /* verb self-test */
  .vt-card{border:2px solid #d9e6ff}
  .vt-intro{font-size:14px;color:var(--ink);line-height:1.8;margin:10px 0}
  .vt-eg{background:#f4f8ff;border-radius:10px;padding:9px 11px;font-size:12.5px;color:var(--sub);margin:8px 0}
  .vt-eg b{color:var(--accent)}
  .vt-start,.vt-check{display:block;width:100%;border:none;border-radius:12px;padding:14px;
    font-size:16px;font-weight:800;color:#fff;background:var(--accent);cursor:pointer;margin-top:10px}
  .vt-check{background:var(--ok)}
  .vt-q{border:1px solid var(--line);border-radius:12px;padding:12px;margin:10px 0;background:#fafcff}
  .vt-head{font-size:14px;margin-bottom:9px}
  .vt-n{display:inline-block;min-width:22px;height:22px;line-height:22px;text-align:center;
    background:var(--accent);color:#fff;border-radius:50%;font-size:12px;font-weight:800;margin-right:6px}
  .vt-given{background:#fff0ed;color:var(--verb);border-radius:8px;padding:2px 9px;font-weight:600}
  .vt-given b{font-size:16px}
  .vt-mean{color:var(--sub);font-size:12.5px;margin-left:4px}
  .vt-fields{display:flex;gap:10px;flex-wrap:wrap}
  .vt-field{flex:1;min-width:120px}
  .vt-field label{display:block;font-size:12px;color:var(--sub);font-weight:700;margin-bottom:3px}
  .vt-field input{width:100%;box-sizing:border-box;font-size:17px;padding:10px 11px;
    border:1.5px solid var(--line);border-radius:9px;background:#fff;outline:none}
  .vt-field input:focus{border-color:var(--accent)}
  .vt-field input.ok{border-color:var(--ok);background:#eafaf0;color:#166a3e;font-weight:700}
  .vt-field input.bad{border-color:#ea5455;background:#fdeeee;color:#b83b3b;font-weight:700}
  .vt-ans{display:none;margin-top:8px;font-size:13px;color:#166a3e;background:#eafaf0;
    border-radius:8px;padding:7px 10px}
  .vt-ans.miss{color:#b83b3b;background:#fdeeee}
  .vt-score{display:none;text-align:center;font-size:18px;font-weight:800;margin:14px 0 4px}
  .vt-score .msg{display:block;font-size:13px;font-weight:600;color:var(--sub);margin-top:3px}
  /* table quiz */
  .vt-table{width:100%;border-collapse:separate;border-spacing:6px;margin-top:8px;table-layout:fixed}
  .vt-table th{background:#eef4ff;color:var(--accent);font-size:12px;padding:10px 3px;
    border:none;border-radius:12px;text-align:center;line-height:1.25}
  .vt-table td{border:none;padding:4px 2px;text-align:center;vertical-align:middle}
  .vt-table td.given{background:#f0f2f5;font-weight:800;color:#333;font-size:15px;border-radius:14px;padding:12px 5px}
  .vt-table input{width:100%;box-sizing:border-box;font-size:15px;padding:11px 5px;
    border:1.5px solid var(--line);border-radius:12px;text-align:center;outline:none;
    background:var(--card);color:var(--ink)}
  .vt-table input:focus{border-color:var(--accent)}
  .vt-table input.ok{border-color:var(--ok);background:#eafaf0;color:#166a3e;font-weight:700}
  .vt-table input.bad{border-color:#ea5455;background:#fdeeee;color:#b83b3b;font-weight:700}
  .cell-ans{font-size:11.5px;color:#b83b3b;margin-top:4px;font-weight:700}
  .cell-mean{font-size:11.5px;color:var(--sub);font-weight:600;margin-top:4px}
  .study-pat{background:#fffaf0;border:1px solid #ffe6bf;border-radius:10px;padding:10px 12px;
    font-size:13px;line-height:1.7;color:#5c4a2e;margin:10px 0}
  .study-pat b{color:#c8641a}
  .step-label{display:inline-block;font-size:12px;font-weight:800;color:var(--accent);
    background:#eef4ff;border-radius:8px;padding:2px 9px;margin-bottom:7px}

  /* theme toggle */
  header .wrap{position:relative}
  .theme-btn{position:absolute;top:-2px;right:0;background:rgba(255,255,255,.22);border:none;
    color:#fff;font-size:18px;width:40px;height:40px;border-radius:50%;cursor:pointer;line-height:1}
  .rev-item{background:linear-gradient(135deg,#eafaf0,#e5f6ff)}

  /* ===== 深色模式 ===== */
  body.dark{--bg:#141a21;--card:#1e2530;--ink:#e7ecf3;--sub:#96a3b3;--accent:#5b95ff;
    --verb:#ff8a75;--verbbg:#3a2622;--ok:#3ddc84;--line:#2d3743;--shadow:0 2px 14px rgba(0,0,0,.45)}
  body.dark .s{background:#232c38}
  body.dark .s:active{background:#2a3542}
  body.dark .tbtn{background:#232c38;color:var(--ink)}
  body.dark .tbtn:active{background:#2a3542}
  body.dark .q{background:#232c38}
  body.dark .q .qa{background:#12331f;color:#7ee2a8}
  body.dark .menu-item:active{background:#2a3542}
  body.dark .rev-item{background:linear-gradient(135deg,#16302a,#173039)}
  body.dark .vt-card{border-color:#2f3f57}
  body.dark .vt-eg{background:#232c38}
  body.dark .vt-table th{background:#25303e;color:#8fb4ff}
  body.dark .vt-table td.given{background:#2a3542;color:#e7ecf3}
  body.dark .vt-table input.ok{background:#12331f;color:#7ee2a8}
  body.dark .vt-table input.bad{background:#3a1f22;color:#ff9a9a}
  body.dark .study-pat{background:#2a2517;border-color:#4a4024;color:#e7d3ad}
  body.dark .study-pat b{color:#ffb066}
  body.dark .step-label,body.dark .num{background:#25303e;color:#8fb4ff}
  body.dark .vt-given{background:#3a2622;color:var(--verb)}
  body.dark .b-grp{background:#2a3542;color:#9aa7b8}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <button id="themeToggle" class="theme-btn" aria-label="切換深色模式">🌙</button>
    <h1 id="hTitle">動詞故事聽讀 🎧</h1>
    <p id="hSub">邊聽、邊讀、邊記動詞三態</p>
  </div>
</header>

<div class="wrap" id="app"></div>

<footer>
  本頁只用來練習動詞，故事為原創內容。<br>用手機瀏覽器開啟；可「加入主畫面」當 App 用。
</footer>

<script>
const app = document.getElementById('app');

function renderSentence(s){
  const en = s.en.replace(/\*(.+?)\*/g, '<span class="v">$1</span>');
  const div = document.createElement('div');
  div.className = 's';
  div.innerHTML = `<div class="en">${en}</div><div class="zh">${s.zh}</div>`;
  div.addEventListener('click', ()=> div.classList.toggle('open'));
  return div;
}

function audioButton(label, sub, src, cls){
  const wrap = document.createElement('button');
  wrap.className = 'abtn ' + cls;
  wrap.innerHTML = `▶︎ ${label} <small>${sub}</small>`;
  const audio = new Audio(src);
  wrap.addEventListener('click', ()=>{
    // stop other audios
    document.querySelectorAll('audio').forEach(a=>{ if(a!==audio){a.pause();} });
    document.querySelectorAll('.abtn').forEach(b=>{ if(b!==wrap){b.classList.remove('playing'); b.innerHTML=b.dataset.idle;} });
    if(audio.paused){ audio.play(); wrap.classList.add('playing'); wrap.innerHTML=`⏸ 播放中… <small>${sub}</small>`; }
    else{ audio.pause(); wrap.classList.remove('playing'); wrap.innerHTML=wrap.dataset.idle; }
  });
  wrap.dataset.idle = `▶︎ ${label} <small>${sub}</small>`;
  audio.addEventListener('ended', ()=>{ wrap.classList.remove('playing'); wrap.innerHTML=wrap.dataset.idle; });
  document.body.appendChild(audio);
  return wrap;
}

function section(title, closedByDefault){
  const sec = document.createElement('div');
  sec.className = 'sec' + (closedByDefault ? ' closed':'');
  const h = document.createElement('div');
  h.className = 'sec-h';
  h.innerHTML = `<span>${title}</span><span class="chev">▼</span>`;
  const body = document.createElement('div');
  body.className = 'sec-body';
  h.addEventListener('click', ()=> sec.classList.toggle('closed'));
  sec.appendChild(h); sec.appendChild(body);
  return {sec, body};
}

function verbTableEl(verbs){
  const wrap = document.createElement('div');
  let rows = '<table><tr><th>Base 原形</th><th>Past 過去式</th><th>Past Participle 過去分詞</th></tr>';
  verbs.forEach(v=>{
    rows += `<tr><td class="base">${v.v}<span class="zh">${v.zh||''}</span></td><td>${v.ved}</td><td>${v.vpp}</td></tr>`;
  });
  wrap.innerHTML = rows + '</table>';
  return wrap;
}

const GENRE = {narrative:['記敘','b-narrative'], dialogue:['對話','b-dialogue'], joke:['笑話','b-joke'],
  adventure:['冒險','b-joke'], science:['科普','b-dialogue'], school:['校園','b-narrative']};
const GROUPINFO = {
  aaa:{name:'三態全同',tip:'三個長得一模一樣（cut-cut-cut）。'},
  aba:{name:'頭尾相同 A-B-A',tip:'只有中間變，第三態又變回原形（come-came-come）。'},
  ought:{name:'ought / aught 家族',tip:'字尾變 -ought/-aught，都唸 [ɔt]（buy-bought-bought）。'},
  ept:{name:'-ept 家族',tip:'字尾變 -ept（keep-kept-kept）。'},
  dt:{name:'結尾變 t',tip:'字尾 d 換成 t、或加 t（feel-felt-felt）。'},
  abb:{name:'母音變一次 A-B-B',tip:'母音只變一次，後兩態相同（win-won-won）。'},
  aid:{name:'拼法小改裝',tip:'拼法小小變（say-said-said）。'},
  iau:{name:'i-a-u 三段變',tip:'母音照 i→a→u 走（sing-sang-sung）。'},
  ew:{name:'ew / own 家族',tip:'過去式 -ew、第三態 -own（know-knew-known）。'},
  oen:{name:'o…en 家族',tip:'過去式變 o、第三態加 -en（speak-spoke-spoken）。'},
  itten:{name:'雙寫 + en 家族',tip:'子音雙寫再加 -en（write-wrote-written）。'},
  orn:{name:'ore / orn 家族',tip:'過去式 -ore、第三態 -orn（wear-wore-worn）。'},
  solo:{name:'個性派',tip:'沒有規律，要一個一個記熟。'},
  mixed:{name:'綜合',tip:'這篇混合各種變化，順便一起複習。'}
};
const REGULAR_NOTE = '💡 規則動詞只加 -ed（play → played → played）；<b>下面這些是要特別記的「不規則」動詞</b>。';

function renderMenu(){
  app.innerHTML='';
  window.scrollTo(0,0);
  document.getElementById('hTitle').textContent = DATA.meta.title + ' 🎧';
  document.getElementById('hSub').textContent = DATA.meta.subtitle;
  const intro = document.createElement('div'); intro.className='menu-intro';
  intro.innerHTML = `共 ${DATA.stories.length} 篇故事，每篇專攻一組動詞。點一篇開始聽讀 👇`;
  app.appendChild(intro);
  // 綜合複習入口
  const rev = document.createElement('div'); rev.className='menu-item rev-item';
  rev.innerHTML = `<div class="num" style="background:#28c76f">🔁</div>
    <div class="mtxt"><div class="mt">綜合複習測驗</div>
    <div class="mz">跨全部故事，隨機抽 20 個動詞考三態</div></div><div class="arrow">›</div>`;
  rev.addEventListener('click', renderReview);
  app.appendChild(rev);
  DATA.stories.forEach((st,i)=>{
    const g = GENRE[st.genre] || ['故事','b-grp'];
    const item = document.createElement('div'); item.className='menu-item';
    item.innerHTML = `<div class="num">${i+1}</div>
      <div class="mtxt"><div class="mt">${st.title}</div><div class="mz">${st.zh_title}</div>
      <div class="badges"><span class="badge ${g[1]}">${g[0]}</span>
      <span class="badge b-grp">${st.verbs.length} 動詞</span></div></div>
      <div class="arrow">›</div>`;
    item.addEventListener('click', ()=> renderStory(st));
    app.appendChild(item);
  });
}

function renderStory(st){
  app.innerHTML='';
  window.scrollTo(0,0);
  document.getElementById('hTitle').textContent = st.title;
  document.getElementById('hSub').textContent = st.zh_title;
  const back = document.createElement('button'); back.className='backbtn';
  back.innerHTML = '‹ 返回故事列表';
  back.addEventListener('click', ()=>{ document.querySelectorAll('audio').forEach(a=>a.pause()); renderMenu(); });
  app.appendChild(back);

  // ① 先學：這篇的動詞三態（預設折疊，讓使用者自己選要不要先複習）
  const scard = document.createElement('div'); scard.className='card';
  const gi = GROUPINFO[st.group] || {name:'', tip:''};
  const {sec:ssec, body:sbody} = section('① 先學：這篇的動詞三態（點開先複習，或直接往下讀）', true);
  const spat = document.createElement('div'); spat.className='study-pat';
  spat.innerHTML = (gi.name ? `<b>規律：${gi.name}</b> — ${gi.tip}<br>` : '') + REGULAR_NOTE;
  const snote = document.createElement('div'); snote.className='hint-audio'; snote.style.marginTop='8px';
  snote.textContent = '想先複習就看這張表；想直接挑戰，收起來直接往下讀故事就好。';
  sbody.appendChild(spat); sbody.appendChild(verbTableEl(st.verbs)); sbody.appendChild(snote);
  scard.appendChild(ssec); app.appendChild(scard);

  // story card
  const card = document.createElement('div'); card.className='card';
  card.innerHTML = `<div class="step-label">② 讀 &amp; 聽</div><div class="story-title">${st.title}</div><div class="story-zh">${st.zh_title}</div>`;

  // audio
  const arow = document.createElement('div'); arow.className='audio-row';
  arow.appendChild(audioButton('正常速','正常語速', st.audio_normal, 'normal'));
  arow.appendChild(audioButton('慢速','適合聽寫', st.audio_slow, 'slow'));
  card.appendChild(arow);
  const ah = document.createElement('div'); ah.className='hint-audio';
  ah.textContent = '💡 先只聽、不看字，再邊聽邊讀。慢速版可以用來一句一句寫下來（聽寫）。';
  card.appendChild(ah);

  // mode toggle: 全文 / 逐句
  const modeRow = document.createElement('div'); modeRow.className='toolbar';
  const bFull = document.createElement('button'); bFull.className='tbtn active'; bFull.textContent='📖 全文';
  const bSent = document.createElement('button'); bSent.className='tbtn'; bSent.textContent='逐句對照';
  modeRow.appendChild(bFull); modeRow.appendChild(bSent);
  card.appendChild(modeRow);

  // --- 全文模式 ---
  const full = document.createElement('div'); full.className='fulltext';
  const enHtml = st.sentences.map(s=> s.en.replace(/\*(.+?)\*/g,'<span class="v">$1</span>')).join(' ');
  const zhHtml = st.sentences.map(s=> s.zh).join('');
  full.innerHTML = `<div class="enblock">${enHtml}</div><div class="zhblock">${zhHtml}</div>`;
  const fullTools = document.createElement('div'); fullTools.className='toolbar';
  const bZh = document.createElement('button'); bZh.className='tbtn'; bZh.textContent='顯示全文中譯';
  fullTools.appendChild(bZh);
  bZh.onclick = ()=>{ full.classList.toggle('showzh');
    bZh.textContent = full.classList.contains('showzh') ? '隱藏中譯' : '顯示全文中譯'; };

  // --- 逐句模式 ---
  const box = document.createElement('div'); box.style.display='none';
  st.sentences.forEach(s=> box.appendChild(renderSentence(s)));
  const sentTools = document.createElement('div'); sentTools.className='toolbar'; sentTools.style.display='none';
  const bAll = document.createElement('button'); bAll.className='tbtn'; bAll.textContent='顯示全部中文';
  const bNone= document.createElement('button'); bNone.className='tbtn'; bNone.textContent='隱藏全部中文';
  sentTools.appendChild(bAll); sentTools.appendChild(bNone);
  bAll.onclick =()=> box.querySelectorAll('.s').forEach(e=>e.classList.add('open'));
  bNone.onclick=()=> box.querySelectorAll('.s').forEach(e=>e.classList.remove('open'));

  card.appendChild(fullTools); card.appendChild(full);
  card.appendChild(sentTools); card.appendChild(box);

  const tip = document.createElement('div'); tip.className='hint-audio';
  tip.style.marginTop='10px';
  const setTip = ()=> tip.textContent = full.style.display==='none'
    ? '👆 點任一句可以看／收中文翻譯。紅字就是這篇的重點動詞。'
    : '👆「全文」先讀順整篇；紅字是重點動詞。需要逐句對照中文時切到「逐句對照」。';
  function showFull(){ bFull.classList.add('active'); bSent.classList.remove('active');
    full.style.display=''; fullTools.style.display=''; box.style.display='none'; sentTools.style.display='none'; setTip(); }
  function showSent(){ bSent.classList.add('active'); bFull.classList.remove('active');
    full.style.display='none'; fullTools.style.display='none'; box.style.display=''; sentTools.style.display=''; setTip(); }
  bFull.onclick=showFull; bSent.onclick=showSent; setTip();
  card.appendChild(tip);
  app.appendChild(card);

  // 讀後測驗
  const qcard = document.createElement('div'); qcard.className='card';
  const {sec:qsec, body:qbody} = section('③ 讀後測驗（用動詞回答看看）', false);
  st.questions.forEach(q=>{
    const qd = document.createElement('div'); qd.className='q';
    qd.innerHTML = `<div class="qt">${q.q}</div><div class="qh">提示：${q.hint}</div>
      <div class="reveal">看答案 ▾</div><div class="qa">${q.a}</div>`;
    qd.querySelector('.reveal').addEventListener('click', ()=>{
      qd.classList.toggle('open');
      qd.querySelector('.reveal').textContent = qd.classList.contains('open') ? '收起 ▴' : '看答案 ▾';
    });
    qbody.appendChild(qd);
  });
  qcard.appendChild(qsec); app.appendChild(qcard);

  renderVerbTest(st);
}

const VLABEL = {base:'原形', past:'過去式', pp:'過去分詞'};
function vtok(s){ return (s.toLowerCase().match(/[a-z]+/g) || []); }
function fieldTokens(v, k){ return k==='base' ? [v.v.toLowerCase()] : (k==='past' ? vtok(v.ved) : vtok(v.vpp)); }
function fieldShow(v, k){ return k==='base' ? v.v : (k==='past' ? v.ved : v.vpp); }
function fieldFirst(v, k){ return fieldShow(v,k).split('/')[0].trim(); }

// 共用：把三態默寫表格建進 area；getVerbs 每次呼叫回傳一份動詞清單（複習時可重新抽）
function verbQuizTable(area, getVerbs){
  area.innerHTML='';
  const keys=['base','past','pp'];
  const rows = getVerbs().map(v=> ({ v, shown: keys[Math.floor(Math.random()*3)] }));

  const table=document.createElement('table'); table.className='vt-table';
  table.innerHTML='<thead><tr><th>Base<br>原形</th><th>Past<br>過去式</th>'
    + '<th>Past Participle<br>過去分詞</th></tr></thead>';
  const tbody=document.createElement('tbody');
  rows.forEach(r=>{
    const tr=document.createElement('tr'); tr._q=r;
    keys.forEach(k=>{
      const td=document.createElement('td');
      if(k===r.shown){ td.className='given'; td.textContent=fieldFirst(r.v,k); }
      else{ td.innerHTML=`<input data-field="${k}" type="text" inputmode="text" autocapitalize="none" `
        + `autocorrect="off" autocomplete="off" spellcheck="false"><div class="cell-ans"></div>`; }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody); area.appendChild(table);

  const score=document.createElement('div'); score.className='vt-score';
  const check=document.createElement('button'); check.className='vt-check'; check.textContent='對答案 ✓';
  area.appendChild(score); area.appendChild(check);

  const inputs=[...area.querySelectorAll('input')];
  inputs.forEach((inp,idx)=> inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){ e.preventDefault(); if(idx+1<inputs.length) inputs[idx+1].focus(); else check.click(); }
  }));

  check.onclick=()=>{
    if(check.dataset.done){ verbQuizTable(area, getVerbs); return; }  // 再測一次（重新出題）
    let correct=0, total=0;
    tbody.querySelectorAll('tr').forEach(tr=>{
      const r=tr._q; let rowBad=false;
      tr.querySelectorAll('input').forEach(inp=>{
        const k=inp.dataset.field;
        const val=(inp.value||'').trim().toLowerCase();
        const ansEl=inp.parentElement.querySelector('.cell-ans');
        total++;
        if(val && fieldTokens(r.v,k).includes(val)){ inp.classList.add('ok'); correct++; ansEl.textContent=''; }
        else{ inp.classList.add('bad'); ansEl.textContent='→ '+fieldShow(r.v,k); rowBad=true; }
        inp.disabled=true;
      });
      if(rowBad) missAdd(r.v.v); else missDec(r.v.v);
      // 答完才顯示意思（灰底格下方），整張表變複習卡
      const gc=tr.querySelector('td.given');
      if(gc && r.v.zh && !gc.querySelector('.cell-mean')){
        gc.insertAdjacentHTML('beforeend', `<div class="cell-mean">${r.v.zh}</div>`);
      }
    });
    const pct = total? correct/total : 0;
    const msg = pct===1 ? '太厲害了，全部答對！🎉' : pct>=0.8 ? '很棒，快全對了！💪'
      : pct>=0.5 ? '不錯，再多練幾次會更熟 👍' : '沒關係，看正解複習後再測一次 🔁';
    score.innerHTML=`答對 ${correct} / ${total}<span class="msg">${msg}</span>`;
    score.style.display='block';
    check.textContent='再測一次 ↺（重新隨機出題）'; check.dataset.done='1';
    score.scrollIntoView({behavior:'smooth', block:'center'});
  };
}

function renderVerbTest(st){
  const card = document.createElement('div'); card.className='card vt-card';
  card.innerHTML = '<div class="sec-h" style="cursor:default"><span>④ 三態默寫自測</span></div>';
  const intro = document.createElement('div'); intro.className='vt-intro';
  intro.innerHTML = '每一列只給你三態中的<b>一態</b>（灰底那格），另外兩格請<b>親手打出來</b>'
    + '（沒有選項、不會自動改字）。填完按「對答案」。';
  const eg = document.createElement('div'); eg.className='vt-eg';
  eg.innerHTML = '灰底 = 已給你的；白底空格 = 要你填。三欄 = Base（原形）／Past（過去式）／Past Participle（過去分詞）。';
  const area = document.createElement('div');
  const start = document.createElement('button'); start.className='vt-start';
  start.textContent = '開始測驗 ▶︎（'+st.verbs.length+' 題）';
  card.appendChild(intro); card.appendChild(eg); card.appendChild(start); card.appendChild(area);

}

// 跨故事去重的完整動詞集(含 meta.extra_verbs:故事沒涵蓋的 dive/lie/spell 由測驗補足)
function allVerbs(){
  const seen={}, out=[];
  DATA.stories.forEach(st=> st.verbs.forEach(v=>{ if(!seen[v.v]){ seen[v.v]=1; out.push(v); } }));
  (DATA.meta.extra_verbs||[]).forEach(v=>{ if(!seen[v.v]){ seen[v.v]=1; out.push(v); } });
  return out;
}
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function sample(arr, n){ return shuffle(arr).slice(0, Math.min(n, arr.length)); }

// 錯題本(localStorage):v -> 未清償的錯誤次數;答錯+1,整列全對-1
const MISS_KEY='vs_miss';
function missMap(){ try{ return JSON.parse(localStorage.getItem(MISS_KEY))||{}; }catch(e){ return {}; } }
function missSave(m){ localStorage.setItem(MISS_KEY, JSON.stringify(m)); }
function missAdd(v){ const m=missMap(); m[v]=(m[v]||0)+1; missSave(m); }
function missDec(v){ const m=missMap(); if(m[v]){ m[v]--; if(m[v]<=0) delete m[v]; missSave(m); } }
// 複習抽題:優先抽錯題本裡的(錯最多次優先,至多 12 題),其餘隨機補滿
function reviewSample(pool, n){
  const m=missMap();
  const missed=pool.filter(v=>m[v.v]).sort((a,b)=>m[b.v]-m[a.v]).slice(0,12);
  const restPool=pool.filter(v=>!missed.includes(v));
  return shuffle(missed.concat(sample(restPool, n-missed.length)));
}

function renderReview(){
  app.innerHTML=''; window.scrollTo(0,0);
  document.getElementById('hTitle').textContent = '綜合複習測驗';
  document.getElementById('hSub').textContent = '跨全部故事 · 隨機抽考三態';
  const back = document.createElement('button'); back.className='backbtn';
  back.innerHTML = '‹ 返回故事列表';
  back.addEventListener('click', renderMenu);
  app.appendChild(back);

  const card = document.createElement('div'); card.className='card vt-card';
  card.innerHTML = '<div class="sec-h" style="cursor:default"><span>🔁 綜合複習測驗</span></div>';
  const intro = document.createElement('div'); intro.className='vt-intro';
  const pool = allVerbs();
  const nMiss = Object.keys(missMap()).length;
  intro.innerHTML = `從<b>全部 ${pool.length} 個</b>動詞（含 3 個故事沒教到的陷阱動詞 dive／lie／spell）抽 <b>20 題</b>。`
    + (nMiss ? `<br>📒 錯題本裡有 <b>${nMiss}</b> 個動詞，會優先出現——答對一次就消掉一筆。` : '<br>答錯的動詞會記進錯題本，下次優先考。');
  const area = document.createElement('div');
  const start = document.createElement('button'); start.className='vt-start'; start.textContent='開始複習 ▶︎（20 題）';
  card.appendChild(intro); card.appendChild(start); card.appendChild(area);
  app.appendChild(card);
  start.onclick = ()=>{ start.style.display='none'; verbQuizTable(area, ()=> reviewSample(allVerbs(), 20)); };
}

// 深色模式（記住偏好）
const themeBtn = document.getElementById('themeToggle');
const themeMeta = document.querySelector('meta[name="theme-color"]');
function applyTheme(t){
  const dark = t==='dark';
  document.body.classList.toggle('dark', dark);
  themeBtn.textContent = dark ? '☀️' : '🌙';
  if(themeMeta) themeMeta.setAttribute('content', dark ? '#141a21' : '#4f8cff');
}
let theme = localStorage.getItem('vs_theme')
  || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
applyTheme(theme);
themeBtn.onclick = ()=>{
  theme = document.body.classList.contains('dark') ? 'light' : 'dark';
  localStorage.setItem('vs_theme', theme);
  applyTheme(theme);
};
